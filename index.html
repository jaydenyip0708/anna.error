<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>透明的選擇</title>
    <style>
        /* 剛開始與 404 狀態，保持完全無設計的自然排列 */
        #loginStage, #fake404Stage {
            padding: 20px;
            font-family: monospace;
        }

        /* 提示按鈕與內容的極簡原始樣式 */
        .hint-toggle {
            cursor: pointer;
            user-select: none;
            color: #666;
            display: inline-block;
            margin-top: 10px;
        }
        .hint-content {
            display: none;
            color: #888;
            margin-top: 5px;
            padding-left: 15px;
            line-height: 1.6;
        }

        /* ----------------------------------
           點擊「繼續」後，才激活的精緻設計
        ------------------------------------- */
        .scenery-active body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(180deg, #f5f7fa 0%, #e4e8f0 100%);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang TC", "Microsoft JhengHei", sans-serif;
            overflow: hidden;
        }

        .poem-container {
            display: none;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .poem-line {
            font-size: 22px;
            margin: 20px 0;
            opacity: 0;
            transform: translateY(25px);
            transition: opacity 2s cubic-bezier(0.22, 1, 0.36, 1), transform 2s cubic-bezier(0.22, 1, 0.36, 1);
            letter-spacing: 8px;
            font-weight: 300;
            color: #2c3e50;
        }

        .poem-line:nth-child(1) {
            font-weight: 400;
            color: #1a1a1a;
        }
        .poem-line:nth-child(2) {
            color: #7f8c8d;
        }

        /* 啟動逐行浮現 */
        .poem-container.show .poem-line {
            opacity: 1;
            transform: translateY(0);
        }
    </style>
</head>
<body>

    <div id="loginStage">
        Password: <input type="password" id="passwordInput">
        <button onclick="handleLogin()">Login</button>
        
        <div style="margin-top: 5px;">
            <div class="hint-toggle" onclick="toggleHint()"><span id="hintArrow">▶</span> Hint</div>
            <div class="hint-content" id="hintText">4 digits</div>
        </div>

        <div id="errorMsg" style="color: red; margin-top: 10px; display: none;"></div>
    </div>

    <div id="fake404Stage" style="display: none;">
        <h1>404 Not Found</h1>
        <p>The requested URL was not found on this server.</p>
        <p id="hiddenErrorCode" style="color: #555; font-style: italic;"></p> 
        <hr>
        <address>Apache/2.4.41 (Ubuntu) Server at localhost Port 80</address>
        
        <div style="margin-top: 30px;">
            <button onclick="clickBack()" style="display: inline-block; margin-right: 15px;">← 返回 / Back</button>
            <button id="continueBtn" onclick="enterPoemWorld()" style="display: none;">繼續 / Continue →</button>
        </div>
    </div>

    <div class="poem-container" id="poemContainer">
        <div class="poem-line">我愛得很透明</div>
        <div class="poem-line">像是玻璃</div>
        <div class="poem-line">茫茫人海中</div>
        <div class="poem-line">還是選擇你</div>
        <div class="poem-line">沒人能代替</div>
        <div class="poem-line">放棄了邏輯</div>
    </div>

    <script>
        // 三個密碼各自獨立計算次數
        let count0708 = 0;
        let count1016 = 0;
        let count1724 = 0;
        
        let isIn404 = false;

        // 控制提示小三角
        function toggleHint() {
            const hintText = document.getElementById('hintText');
            const hintArrow = document.getElementById('hintArrow');
            
            if (count1724 >= 1) {
                hintText.innerHTML = "4 digits<br>almost there";
            } else {
                hintText.innerHTML = "4 digits";
            }

            if (hintText.style.display === 'block') {
                hintText.style.display = 'none';
                hintArrow.innerText = '▶';
            } else {
                hintText.style.display = 'block';
                hintArrow.innerText = '▼';
            }
        }

        // 支援 Enter 鍵
        document.getElementById('passwordInput').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') handleLogin();
        });

        function handleLogin() {
            if (isIn404) return;

            const input = document.getElementById('passwordInput').value.trim();
            const errorMsg = document.getElementById('errorMsg');
            const loginStage = document.getElementById('loginStage');
            const fake404Stage = document.getElementById('fake404Stage');
            const hiddenErrorCode = document.getElementById('hiddenErrorCode');
            const continueBtn = document.getElementById('continueBtn');

            // 預設先隱藏繼續按鈕
            continueBtn.style.display = 'none';

            // --- 密碼 0708 ---
            if (input === '0708') {
                errorMsg.style.display = 'none';
                isIn404 = true;
                count0708++;
                hiddenErrorCode.innerText = 'error 1016';
                loginStage.style.display = 'none';
                fake404Stage.style.display = 'block';
            }
            // --- 密碼 1016 ---
            else if (input === '1016') {
                errorMsg.style.display = 'none';
                isIn404 = true;
                count1016++;
                hiddenErrorCode.innerText = 'error 0708';
                loginStage.style.display = 'none';
                fake404Stage.style.display = 'block';
            }
            // --- 核心密碼 1724 ---
            else if (input === '1724') {
                errorMsg.style.display = 'none';
                count1724++; 

                if (count1724 === 1 || count1724 === 2) {
                    // 第一、二次：純粹的 404
                    isIn404 = true;
                    hiddenErrorCode.innerText = ''; 
                    loginStage.style.display = 'none';
                    fake404Stage.style.display = 'block';
                    
                    document.getElementById('hintText').style.display = 'none';
                    document.getElementById('hintArrow').innerText = '▶';
                } 
                else {
                    // 第三次（及以上）：依然進入 404，但偷偷多出「繼續」按鈕！
                    isIn404 = true;
                    hiddenErrorCode.innerText = ''; 
                    loginStage.style.display = 'none';
                    fake404Stage.style.display = 'block';
                    continueBtn.style.display = 'inline-block'; // 顯示繼續
                    
                    document.getElementById('hintText').style.display = 'none';
                    document.getElementById('hintArrow').innerText = '▶';
                }
            }
            else {
                errorMsg.innerText = 'password incorrect';
                errorMsg.style.display = 'block';
                clearInput();
            }
        }

        // 點擊「繼續 / Continue」➔ 進入最終美麗世界
        function enterPoemWorld() {
            document.getElementById('fake404Stage').style.display = 'none';
            document.documentElement.classList.add('scenery-active');
            
            const poemContainer = document.getElementById('poemContainer');
            poemContainer.style.display = 'flex';
            
            setTimeout(() => {
                poemContainer.classList.add('show');
                const lines = document.querySelectorAll('.poem-line');
                lines.forEach((line, index) => {
                    line.style.transitionDelay = `${index * 0.8}s`;
                });
            }, 50);
        }

        // 點擊「返回」
        function clickBack() {
            document.getElementById('fake404Stage').style.display = 'none';
            document.getElementById('loginStage').style.display = 'block';
            isIn404 = false;
            clearInput();
        }

        function clearInput() {
            document.getElementById('passwordInput').value = '';
            document.getElementById('passwordInput').focus();
        }
    </script>
</body>

</html>
